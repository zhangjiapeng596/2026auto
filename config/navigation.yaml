# config/navigation.yaml
# ========================================
# 导航全部参数（单源真理）
# move_base.launch.xml 在 carto 默认参数之后加载此文件，
# 同命名空间的键直接覆盖，无需修改 robot_slam/params/carto/
# ========================================
# 调参指南:
#   旋转太慢         → 增大 max_vel_theta / acc_lim_theta
#   目标点附近抽搐   → 增大 xy_goal_tolerance / yaw_goal_tolerance
#   贴障碍物太近     → 增大 inflation_radius / occdist_scale
#   路径绕远路       → 减小 inflation_radius / cost_scaling_factor
#   末端来回震荡     → 增大 oscillation_reset_dist
# ========================================

# ---- 全局代价地图 (4m×4m，覆盖 3.6m 场地 + 边距) ----
global_costmap:
  plugins:
    - {name: static_layer, type: "costmap_2d::StaticLayer"}
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
  global_frame: map
  robot_base_frame: base_link
  footprint: [[-0.20, -0.18], [-0.20, 0.18], [0.20, 0.18], [0.20, -0.18]]
  transform_tolerance: 2.0
  update_frequency: 8.0
  publish_frequency: 4.0
  static_map: true
  rolling_window: false
  width: 4.0                # 场地 3.6m + 两侧各 0.2m 边距
  height: 4.0
  resolution: 0.02           # 5cm/pixel，精度足够
  obstacle_range: 2.5        # 障碍物检测距离 (m)，让全局规划提前看到雷达障碍
  raytrace_range: 3.0        # 射线清除距离 (m)，大于 obstacle_range
  inflation_radius: 0.08     # 全局障碍物膨胀半径，促使全局路径绕开障碍
  cost_scaling_factor: 8.0   # 降低衰减速度，让障碍影响范围更连续
  map_type: costmap
  static_layer:
    map_topic: /map
    subscribe_to_updates: false
  obstacle_layer:
    enabled: true
    observation_sources: scan
    scan: {sensor_frame: laser_link, data_type: LaserScan, topic: scan_filtered, marking: true, clearing: true, obstacle_range: 2.5, raytrace_range: 3.0}
  inflation_layer:
    enabled: true
    inflation_radius: 0.08
    cost_scaling_factor: 8.0

# ---- 局部代价地图 (2m×2m 滚动窗口) ----
local_costmap:
  plugins:
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
  global_frame: odom
  robot_base_frame: base_link
  footprint: [[-0.20, -0.18], [-0.20, 0.18], [0.20, 0.18], [0.20, -0.18]]
  transform_tolerance: 2.0
  update_frequency: 10.0
  publish_frequency: 5.0
  static_map: false
  rolling_window: true
  width: 3.0                 # 机器人周围 ±1.5m
  height: 3.0
  resolution: 0.02
  obstacle_range: 2.5        # 障碍物检测距离 (m)，提前感知但不过度
  raytrace_range: 3.0        # 射线清除距离 (m)，大于 obstacle_range
  inflation_radius: 0.10      # 局部障碍物膨胀半径，加大边框/挡板安全距离
  cost_scaling_factor: 7.0    # 稍放宽代价衰减，让贴边路径代价更高
  map_type: costmap
  obstacle_layer:
    observation_sources: scan
    scan: {sensor_frame: laser_link, data_type: LaserScan, topic: scan_filtered, marking: true, clearing: true, obstacle_range: 2.5, raytrace_range: 3.0}
  inflation_layer:
    enabled: true
    inflation_radius: 0.10
    cost_scaling_factor: 7.0

# ---- DWA 局部规划器 ----
DWAPlannerROS:
  # -- 速度 --
  max_vel_x: 0.45             # 最大前向速度 (m/s)，降低打滑风险
  min_vel_x: -0.20            # 最大后退速度
  max_vel_y: 0.20             # 全向横移速度 (m/s)
  min_vel_y: -0.20
  max_vel_trans: 0.45         # 实际平移限幅
  min_vel_trans: 0.02
  max_vel_theta: 3.5          # 最大旋转速度 (rad/s)，降低急转打滑
  min_vel_theta: 0.01         # 最小旋转速度，极致慢旋
  # -- 加速度 --
  acc_lim_x: 1.8              # 前向加速度 (m/s²)，降低起步/刹车打滑
  acc_lim_y: 2.5              # 横移加速度
  acc_lim_theta: 5.0          # 旋转加速度 (rad/s²)，降低急转打滑
  # -- 到达判定 --
  xy_goal_tolerance: 0.06     # 位置容差 (m)，收紧减少与状态机的精度差
  yaw_goal_tolerance: 0.10    # 朝向容差 (rad), ≈5.7°
  latch_xy_goal_tolerance: false
  # -- 轨迹模拟 --
  sim_time: 1.5               # 前向模拟时长 (s)，适度加长评估绕障（1.7太长影响CPU）
  vx_samples: 10              # x 速度采样数
  vy_samples: 10              # y 速度采样数 (平衡横向探索与CPU负载)
  vth_samples: 25             # 角速度采样数 (平衡旋转探索与CPU负载)
  controller_frequency: 10.0
  # -- 代价权重 --
  path_distance_bias: 12.0    # 适度降低路径跟随（15→12），允许绕障偏离
  goal_distance_bias: 32.0    # 轻度降低目标引力（35→32），给绕障留空间
  occdist_scale: 0.25         # 提高避障权重，减少贴边框/挡板擦行
  # -- 其他 --
  forward_point_distance: 0.325
  stop_time_buffer: 0.2       # 碰撞前停车缓冲 (s)
  scaling_speed: 0.25
  max_scaling_factor: 0.2
  oscillation_reset_dist: 0.12  # 移动超过此距离重置震荡检测 (恢复灵敏度)
  publish_traj_pc: false        # 关闭调试点云，降低CPU占用
  publish_cost_grid_pc: false   # 关闭紫色代价网格点云，避免RViz铺满且拖慢规划
  holonomic_robot: true         # 全向底盘 (麦克纳姆轮)

# ---- 全局规划器 ----
GlobalPlanner:
  old_navfn_behavior: false
  use_quadratic: true
  use_dijkstra: true           # Dijkstra 算法 (true=最短路径, false=A*)
  use_grid_path: false
  allow_unknown: true          # 允许穿过未知区域规划
  default_tolerance: 0.30       # 目标点被障碍物占据时，在此半径内找最近可行点 (m)
  publish_scale: 100
  lethal_cost: 253
  neutral_cost: 50
  cost_factor: 3.0
  publish_potential: true

# ---- move_base 全局参数 ----
controller_frequency: 10.0
controller_patience: 15.0      # 控制器容忍超时 (s)
planner_frequency: 5.0         # 全局规划重规划频率 (Hz)
planner_patience: 5.0
oscillation_timeout: 10.0      # 震荡超时 (s)
oscillation_distance: 0.2
base_local_planner: "dwa_local_planner/DWAPlannerROS"
base_global_planner: "global_planner/GlobalPlanner"
shutdown_costmaps: false

# ---- 安全边距 (独立于 move_base，由状态机使用) ----
fence_safety_margin_m: 0.15
