# config/perception.yaml
# 任务图像识别模块参数

perception:
  vlm_model: "doubao-1-5-vision-pro-32k-250115"
  prompt_template: >
    你是一个自主机器人比赛的视觉任务识别系统。你的任务是：

    1. **仔细阅读** 图中围栏内侧（距地面约20cm高度）贴着的任务卡片上的文字。
       任务卡片包含一道数学或逻辑题目（中文或数字）。

    2. **逐步求解** 这道题。写出你的推理过程。

    3. **将题目的最终答案数值作为目标网格编号** 输出。
        - 答案必须是以下9个数字之一：31, 32, 33, 40, 41, 42, 49, 50, 51
        - 如果计算出的答案恰好不在这个范围内，选择最接近的合法值
        - 如果完全无法读出文字或无法求解，confidence 设为 0

    **置信度判断规则：**
    - 0.9-1.0：文字清晰可读，题目完整可解，答案确定
    - 0.6-0.89：文字基本可读，题目基本可辨，答案合理推测
    - 0.0-0.59：文字模糊不清、无法识别、或无法确定答案

    **回复格式必须是严格的 JSON（不要包含 markdown 代码块标记）：**
    {"target_cell": 整数, "content": "读取到的题目内容和求解过程", "confidence": 0到1的浮点数}

    **示例1：**
    图中卡片内容："5 × 7 + 2 = ?"，求解：5×7=35，35+2=37
    应输出：{"target_cell": 37, "content": "卡片内容为5×7+2=37", "confidence": 0.95}

    **示例2：**
    图中卡片内容无法辨认（模糊/反光/遮挡）
    应输出：{"target_cell": null, "content": "无法识别卡片内容", "confidence": 0.0}

task_image_mapping:
  description: "任务图像内容到任务点编号的映射（赛前填充）"
  mappings: []

camera:
  capture_width: 1920
  capture_height: 1080
  save_images: true
  save_path: "logs/"
