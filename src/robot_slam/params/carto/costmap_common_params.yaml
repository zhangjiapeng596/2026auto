# costmap 通用参数 (global + local 共用)
# ========================================
# 调参指南:
#   导航到目标点附近抽搐 → 减小 inflation_radius / 增大 xy_goal_tolerance
#   贴障碍物太近         → 增大 inflation_radius / 增大 occdist_scale
#   规划路径太保守       → 减小 inflation_radius / 减小 cost_scaling_factor
#   规划路径太激进       → 增大 inflation_radius / 增大 cost_scaling_factor
# ========================================

# 传感器范围: 多远内的障碍物计入代价地图
obstacle_range: 1.5     # 障碍物检测距离(m), 超过此距离忽略
raytrace_range: 2.0      # 射线追踪清除距离(m)

# 机器人 footprint (与 robot.yaml 保持一致)
footprint: [[-0.16, -0.13], [-0.16, 0.13], [0.16, 0.13], [0.16, -0.13]]

# ---- 膨胀层 (核心调参项) ----
# 膨胀半径: 障碍物周围不可通行区域半径
inflation_radius: 0.04

# 代价衰减系数: 越大代价衰减越快, 障碍物影响范围越小
# 范围 1~20, 小场地建议 5~15
cost_scaling_factor: 13.0

map_type: costmap
observation_sources: scan
scan: {sensor_frame: laser_link, data_type: LaserScan, topic: scan_filtered, marking: true, clearing: true}
